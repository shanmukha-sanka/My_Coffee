<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8C4B8C"/>
      <stop offset="45%" stop-color="#E85D6B"/>
      <stop offset="75%" stop-color="#F2793B"/>
      <stop offset="100%" stop-color="#F0B23E"/>
    </linearGradient>
    <linearGradient id="volcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E2417"/>
      <stop offset="100%" stop-color="#1A120B"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3E2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF3E2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#skyGrad)"/>

  <!-- sun -->
  <circle cx="1000" cy="90" r="90" fill="url(#sunGlow)"/>
  <circle cx="1000" cy="90" r="36" fill="#FFF3E2" opacity="0.95"/>

  <!-- distant volcanoes -->
  <path d="M700,300 L800,140 L850,190 L900,120 L980,300 Z" fill="url(#volcGrad)" opacity="0.85"/>
  <path d="M0,300 L90,180 L140,230 L190,150 L260,300 Z" fill="url(#volcGrad)" opacity="0.6"/>

  <!-- main volcano -->
  <path d="M330,300 L470,90 L520,150 L570,60 L680,300 Z" fill="url(#volcGrad)"/>
  <path d="M545,90 C558,78 572,78 585,92 C592,78 612,78 622,96" fill="none" stroke="#F2793B" stroke-width="5" stroke-linecap="round"/>
  <circle cx="565" cy="62" r="11" fill="#F2793B"/>
  <ellipse cx="560" cy="40" rx="14" ry="22" fill="#FFF3E2" opacity="0.7"/>
  <ellipse cx="585" cy="30" rx="11" ry="18" fill="#FFF3E2" opacity="0.5"/>

  <!-- ground band -->
  <rect x="0" y="255" width="1200" height="14" fill="#2E1B10"/>
  <rect x="0" y="269" width="1200" height="31" fill="#1A120B"/>

  <!-- scattered beans along the ground -->
  <ellipse cx="60" cy="282" rx="10" ry="7" fill="#5C3317" transform="rotate(-20 60 282)"/>
  <ellipse cx="95" cy="290" rx="10" ry="7" fill="#3E2417" transform="rotate(18 95 290)"/>
  <ellipse cx="1100" cy="285" rx="10" ry="7" fill="#5C3317" transform="rotate(25 1100 285)"/>
  <ellipse cx="1140" cy="292" rx="10" ry="7" fill="#3E2417" transform="rotate(-12 1140 292)"/>
  <ellipse cx="140" cy="278" rx="9" ry="6" fill="#442712" transform="rotate(8 140 278)"/>
  <ellipse cx="1060" cy="278" rx="9" ry="6" fill="#442712" transform="rotate(-8 1060 278)"/>

  <!-- coffee cup, centered -->
  <g transform="translate(555,205)">
    <path d="M8,0 L92,0 L85,58 C83,68 75,75 65,75 L35,75 C25,75 17,68 15,58 Z" fill="#F0B23E"/>
    <ellipse cx="50" cy="2" rx="42" ry="8" fill="#5C3317"/>
    <ellipse cx="50" cy="2" rx="33" ry="5" fill="#2E1B10"/>
    <path d="M92,10 C111,10 111,40 92,40" fill="none" stroke="#F0B23E" stroke-width="8" stroke-linecap="round"/>
    <path d="M38,-6 C34,-15 42,-20 38,-29" fill="none" stroke="#FFF3E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <path d="M55,-6 C51,-16 59,-21 55,-31" fill="none" stroke="#FFF3E2" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M72,-6 C68,-15 76,-20 72,-29" fill="none" stroke="#FFF3E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- brand text -->
  <text x="600" y="255" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#FFF3E2" letter-spacing="2">Coffee Bloom</text>
</svg>
